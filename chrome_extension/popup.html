<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>MindSafe</title>
    <style>
      :root {
        --ink: #0B1120;
        --muted: #5B6472;
        --line: #E8EDF4;
        --safe: #16A34A;
        --caution: #F59E0B;
        --concern: #DC2626;
        --indigo: #6366F1;
        --sky: #0EA5E9;
      }
      * { box-sizing: border-box; }
      body {
        width: 340px;
        margin: 0;
        padding: 0;
        font-family: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
        font-size: 13px;
        background: #FFFFFF;
        color: var(--ink);
      }
      .head {
        display: flex; align-items: center; gap: 9px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
      }
      .mark {
        width: 26px; height: 26px; border-radius: 8px;
        background: linear-gradient(135deg, var(--indigo), var(--sky));
        display: inline-flex; align-items: center; justify-content: center;
        color: #fff; font-size: 12px; font-weight: 800; letter-spacing: -0.02em;
      }
      .wordmark { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
      .eyebrow {
        margin-left: auto; font-size: 9px; font-weight: 700;
        text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted);
      }
      .body { padding: 16px; }

      /* Score hero */
      .hero { display: flex; align-items: center; gap: 16px; }
      .ring {
        --pct: 0; --ring: var(--muted);
        position: relative; flex: 0 0 auto;
        width: 76px; height: 76px; border-radius: 50%;
        background: conic-gradient(var(--ring) calc(var(--pct) * 1%), var(--line) 0);
        display: grid; place-items: center;
      }
      .ring::after { content:""; position:absolute; inset:7px; background:#fff; border-radius:50%; }
      .ring-num {
        position: relative; z-index: 1;
        font-size: 26px; font-weight: 800; line-height: 1; letter-spacing: -0.03em;
      }
      .ring-num small { font-size: 11px; font-weight: 600; color: var(--muted); }
      .verdict-label { font-size: 17px; font-weight: 700; letter-spacing: -0.01em; line-height: 1.2; }
      .verdict-sub { margin-top: 4px; font-size: 12px; color: var(--muted); line-height: 1.45; }

      /* Pending / empty / error */
      .pending { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--muted); padding: 6px 0; }
      .spinner {
        width: 18px; height: 18px; border-radius: 50%;
        border: 2px solid var(--line); border-top-color: var(--indigo);
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .empty { font-size: 13px; color: var(--muted); line-height: 1.5; }
      .errbox { font-size: 12px; color: var(--concern); line-height: 1.45; }
      .vid-title {
        margin-top: 12px; font-size: 11px; color: var(--muted);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .vid-title a { color: var(--muted); text-decoration: none; }
      .vid-title a:hover { color: var(--ink); }

      /* Stats + dimensions */
      .stats { margin-top: 16px; }
      .stat { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; font-size: 12px; }
      .stat + .stat { border-top: 1px solid var(--line); }
      .stat-k { color: var(--muted); }
      .stat-v { font-weight: 700; font-variant-numeric: tabular-nums; }
      .stat-v span { color: var(--muted); font-weight: 500; }
      .dims { margin-top: 8px; }
      .dim-row { padding: 7px 0; }
      .dim-row + .dim-row { border-top: 1px solid var(--line); }
      .dim-top { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 5px; }
      .dim-name { font-weight: 500; }
      .dim-val { color: var(--muted); font-variant-numeric: tabular-nums; }
      .bar { height: 5px; border-radius: 99px; background: var(--line); overflow: hidden; }
      .bar-fill { height: 100%; border-radius: 99px; }

      /* Age control */
      .age {
        margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--line);
        display: flex; align-items: center; gap: 9px;
      }
      .age label { font-size: 12px; color: var(--ink); font-weight: 500; white-space: nowrap; }
      .age input {
        width: 58px; padding: 6px 8px; border-radius: 8px; border: 1px solid var(--line);
        font: inherit; font-size: 12px; color: var(--ink); background: #FAFBFC;
      }
      .age input:focus { outline: 2px solid var(--indigo); outline-offset: 1px; border-color: transparent; }
      .age button {
        font: inherit; font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 8px;
        background: var(--ink); color: #fff; border: none; cursor: pointer;
        transition: background 0.15s;
      }
      .age button:hover { background: #1E293B; }
      .age .saved { font-size: 12px; color: var(--safe); font-weight: 700; display: none; }
      .foot { margin-top: 12px; font-size: 10px; line-height: 1.4; color: #9AA3B2; }

      @media (prefers-reduced-motion: reduce) { .spinner { animation: none; } }
    </style>
  </head>
  <body>
    <div class="head">
      <span class="mark">MS</span>
      <span class="wordmark">MindSafe</span>
      <span class="eyebrow">Kids Shield</span>
    </div>
    <div class="body">
      <div id="result">
        <div class="pending"><span class="spinner"></span><span>Loading…</span></div>
      </div>
      <div class="age">
        <label for="age-input">Child's age</label>
        <input id="age-input" type="number" min="0" max="18" step="0.5" value="4" />
        <button id="age-save">Save</button>
        <span class="saved" id="age-saved">Saved</span>
      </div>
      <div class="foot">
        Flags videos that may feel too intense or overstimulating for young minds.
        Informational only — not medical advice.
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
