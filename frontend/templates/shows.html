<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Shows</title>

  <!-- Font similar to screenshot -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/static/css/shows.css" />
</head>

<body>
  <section class="shows-section">
    <div class="shows-inner">
      <h1>Example evaluations</h1>
      <p style="text-align:center; color:#5a6184; margin:-8px 0 8px; font-size:15px;">
        Live scores from real MindSafe evaluations. Analyze any of these with the
        extension and its score appears here automatically.
      </p>

      <div class="carousel-wrapper">
        <div class="carousel-viewport">
          <div class="carousel-track">
            {% for card in cards %}
            <article class="card">
              <div class="card-video-wrapper">
                <iframe src="{{ card.embed }}"
                  frameborder="0"
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                  allowfullscreen></iframe>
              </div>
              <div class="card-bottom">
                {% if card.ten is not none %}
                <span class="card-score">{{ card.ten }}/10 score</span>
                {% else %}
                <span class="card-score">Not yet scored</span>
                {% endif %}
              </div>
            </article>
            {% endfor %}
          </div>
        </div>
      </div>
    </div>
  </section>

</body>

</html>
